<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnOrdinary Random Ability Chart</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="title-block">
        <h1>UnOrdinary Random Ability Chart</h1>
        <div class="subtitle">By: Atlas Skie</div>
      </div>

      <input type="file" accept="image/*" id="imgInput" />
      <img id="uploadedImg" class="upload-img" alt="Uploaded Image" />

      <div class="info-box">
        <label><b>Name:</b> <input type="text" id="nameInput" /></label>
        <label><b>Ability:</b> <input type="text" id="abilityInput" /></label>
        <label><b>Level:</b> <span id="levelDisplay" class="level-value">0.0</span></label>
        <label><b>Ability Color:</b> <input type="color" id="colorPicker" value="#92dfec" /></label>

        <div class="stat-row" data-stat="0">
          <span class="stat-name">Power</span>
          <div class="stat-controls">
            <button class="adjust-btn minus" type="button">−</button>
            <span id="powerDisplay" class="stat-value">0.0</span>
            <button class="adjust-btn plus" type="button">+</button>
          </div>
        </div>

        <div class="stat-row" data-stat="1">
          <span class="stat-name">Speed</span>
          <div class="stat-controls">
            <button class="adjust-btn minus" type="button">−</button>
            <span id="speedDisplay" class="stat-value">0.0</span>
            <button class="adjust-btn plus" type="button">+</button>
          </div>
        </div>

        <div class="stat-row" data-stat="2">
          <span class="stat-name">Trick</span>
          <div class="stat-controls">
            <button class="adjust-btn minus" type="button">−</button>
            <span id="trickDisplay" class="stat-value">0.0</span>
            <button class="adjust-btn plus" type="button">+</button>
          </div>
        </div>

        <div class="stat-row" data-stat="3">
          <span class="stat-name">Recovery</span>
          <div class="stat-controls">
            <button class="adjust-btn minus" type="button">−</button>
            <span id="recoveryDisplay" class="stat-value">0.0</span>
            <button class="adjust-btn plus" type="button">+</button>
          </div>
        </div>

        <div class="stat-row" data-stat="4">
          <span class="stat-name">Defense</span>
          <div class="stat-controls">
            <button class="adjust-btn minus" type="button">−</button>
            <span id="defenseDisplay" class="stat-value">0.0</span>
            <button class="adjust-btn plus" type="button">+</button>
          </div>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="chart-area">
        <canvas id="mainChart"></canvas>
      </div>

      <div class="controls">
        <div class="button-row">
          <button id="generateBtn" type="button">Generate Ability</button>
          <button id="viewBtn" type="button">View Character Chart</button>
        </div>
      </div>

      <div class="rates-box">
        <div class="rates-title">Tier Chances</div>
        <div class="rate-row"><span>Low Tier:</span><span>33%</span></div>
        <div class="rate-row"><span>Mid Tier:</span><span>53%</span></div>
        <div class="rate-row"><span>Elite Tier:</span><span>12%</span></div>
        <div class="rate-row"><span>High Tier:</span><span>2%</span></div>
        <div class="rate-row"><span>God Tier:</span><span>0.00001%</span></div>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden">
    <div id="characterBox" class="character-box">
      <button id="closeBtn" class="close-btn" type="button">×</button>

      <div class="image-section">
        <div class="overlay-img-wrap">
          <img id="overlayImg" class="overlay-img" alt="Character Image" />
          <div class="img-watermark">AS</div>
        </div>
        <div class="text-box">
          <b>Name:</b> <span id="overlayName">-</span><br />
          <b>Ability:</b> <span id="overlayAbility">-</span><br />
          <b>Level:</b> <span id="overlayLevel" class="level-value">0.0</span>
        </div>
      </div>

      <div class="overlay-chart">
        <canvas id="overlayChartCanvas"></canvas>
      </div>

      <button id="downloadBtn" type="button">Download Character Chart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
